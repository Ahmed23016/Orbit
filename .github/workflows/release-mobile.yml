name: Android Release

on:
  workflow_dispatch:
    inputs:
      upload_to_play_store:
        description: Upload the Android AAB to Google Play
        required: false
        default: false
        type: boolean
      play_track:
        description: Google Play track
        required: false
        default: internal
        type: string
  push:
    tags:
      - "v*"

jobs:
  android_release:
    name: Signed Android Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Dependencies
        run: npm ci

      - name: Decode Android Keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/orbit-upload-keystore.jks

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Signed Android Release
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease
        env:
          ORBIT_UPLOAD_STORE_FILE: orbit-upload-keystore.jks
          ORBIT_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORBIT_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ORBIT_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

      - name: Upload Android Release APK
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Android Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Write Google Play Service Account
        if: ${{ github.event_name == 'push' || inputs.upload_to_play_store }}
        shell: bash
        run: |
          if [ -n "${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}" ]; then
            echo '${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}' > android/google-play-service-account.json
          fi

      - name: Upload To Google Play
        if: ${{ (github.event_name == 'push' || inputs.upload_to_play_store) && secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJson: android/google-play-service-account.json
          packageName: com.orbit.prayertimes
          releaseFiles: android/app/build/outputs/bundle/release/app-release.aab
          track: ${{ github.event_name == 'push' && 'internal' || inputs.play_track }}
          status: completed
