name: Android Release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  android_release:
    name: Signed Android Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Install Dependencies
        run: npm ci

      - name: Build Web
        run: npm run build

      - name: Decode Android Keystore
        shell: bash
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/orbit-upload-keystore.jks

      - name: Verify Android Keystore
        working-directory: android
        shell: bash
        run: |
          keytool -list -v -keystore orbit-upload-keystore.jks -storepass "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" -alias orbit-upload > /dev/null

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Make Gradle Executable
        working-directory: android
        run: chmod +x gradlew

      - name: Build Signed Android Release
        working-directory: android
        run: ./gradlew assembleRelease bundleRelease
        env:
          ORBIT_UPLOAD_STORE_FILE: orbit-upload-keystore.jks
          ORBIT_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ORBIT_UPLOAD_KEY_ALIAS: orbit-upload
          ORBIT_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}

      - name: Upload Android Release APK
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Upload Android Release AAB
        uses: actions/upload-artifact@v4
        with:
          name: orbit-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
